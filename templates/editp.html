{% extends 'base.html' %}
{% block title %}
    Update profile
{% endblock title %}
{% block head %}
    
{% endblock head %}

{% block content %}
    <div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            
            <div class="card shadow-sm border border-secondary-subtle bg-body-tertiary p-4 rounded-4">
                <div class="card-body">
                    <h2 class="card-title fw-bold text-body mb-1">Your Profile</h2>
                    <p class="text-secondary small mb-4">Keep your information up to date</p>
                    
                    <form method="POST">
                        
                        <div class="mb-3">
                            <label for="staticEmail" class="form-label fw-semibold text-body-secondary text-uppercase small tracking-wider">Email Address</label>
                            <input type="text" readonly class="form-control-plaintext form-control bg-body border-0 px-3 py-2 rounded-3 text-secondary" id="staticEmail" value=" {{current_user.email}}">
                        </div>

                        
                        <div class="mb-3">
                            <label for="text" class="form-label fw-semibold text-body-secondary text-uppercase small tracking-wider">Full Name</label>
                            <input type="text" class="form-control bg-body text-body border-secondary-subtle px-3 py-2 rounded-3" id="text" name="name" value="{{ name }}" placeholder="Enter your full name" required>
                        </div>

                        
                        <div class="mb-3">
                            <label for="genderSelect" class="form-label fw-semibold text-body-secondary text-uppercase small tracking-wider">Gender</label>
                            <select id="genderSelect" class="form-select bg-body text-body border-secondary-subtle px-3 py-2 rounded-3" name="gender">
                                <option value="" {% if not gender %}selected{% endif %} disabled>Select Gender</option>
                                <option value="Male" {% if gender == 'Male' %}selected{% endif %}>Male</option>
                                <option value="Female" {% if gender == 'Female' %}selected{% endif %}>Female</option>
                            </select>
                        </div>

                        
                        <div class="mb-4">
                            <label for="userAge" class="form-label fw-semibold text-body-secondary text-uppercase small tracking-wider">Age</label>
                            <input type="number" class="form-control bg-body text-body border-secondary-subtle px-3 py-2 rounded-3" id="userAge" name="age" min="1" max="120" value="{{ age }}" placeholder="Enter your age">
                        </div>
                        
                       
                        <div class="d-grid mt-2">
                            <button type="submit" class="btn btn-primary fw-semibold py-2 rounded-3 shadow-sm">
                                Save Changes
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
